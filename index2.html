<style>

.gallery-page{
padding-top:20px;
}

.gallery-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.gallery-header h2{
font-family:Lalezar;
font-size:28px;
color:var(--primary-color);
}

.gallery-count{
background:rgba(201,162,39,.15);
color:var(--accent-color);
padding:8px 15px;
border-radius:20px;
}

.gallery-filter{
display:flex;
gap:10px;
overflow:auto;
margin-bottom:25px;
}

.filter-item{
padding:9px 18px;
border-radius:25px;
background:var(--surface-light);
border:1px solid var(--border-light);
color:var(--text-light);
white-space:nowrap;
}

body.dark .filter-item{
background:var(--surface-dark);
color:var(--text-dark);
}

.filter-item.active{
background:var(--primary-color);
color:white;
}
/* گالری اصلی */

.gallery-grid{
display:grid;
grid-template-columns:
repeat(auto-fill,minmax(220px,1fr));
gap:18px;
}

.photo-card{
position:relative;
height:260px;
border-radius:24px;
overflow:hidden;
background:var(--surface-light);
border:1px solid var(--border-light);
box-shadow:var(--shadow-light);
}

body.dark .photo-card{
background:var(--surface-dark);
border-color:var(--border-dark);
box-shadow:var(--shadow-dark);
}

.photo-card img{
width:100%;
height:100%;
object-fit:cover;
transition:.4s;
}

.photo-card:hover img{
transform:scale(1.08);
}

.photo-overlay{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:flex-end;
padding:18px;
background:
linear-gradient(
transparent,
rgba(0,0,0,.85)
);
}

.photo-overlay h3{
color:white;
font-size:17px;
margin-bottom:8px;
}

.photo-info{
display:flex;
justify-content:space-between;
align-items:center;
color:#ddd;
font-size:13px;
}

.photo-tag{
background:var(--accent-color);
color:#222;
padding:5px 12px;
border-radius:20px;
}

@media(max-width:600px){
.gallery-grid{
grid-template-columns:
repeat(2,1fr);
gap:12px;
}

.photo-card{
height:200px;
}
}

</style>

</head>

<script>
const body=document.body;
const btn=document.getElementById("themeToggle");
const saved=localStorage.getItem("theme");
if(saved==="dark"){
body.classList.add("dark");
}
btn.onclick=function(){
body.classList.toggle("dark");
localStorage.setItem(
"theme",
body.classList.contains("dark")?"dark":"light"
);
};
</script>
